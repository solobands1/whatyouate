<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="25%" r="80%">
      <stop offset="0%"   stop-color="#82B8FF"/>
      <stop offset="100%" stop-color="#4A84E8"/>
    </radialGradient>
    <mask id="bite">
      <rect width="512" height="512" fill="white"/>
      <!-- Concave jaw-arc bite from upper-right of plate -->
      <!-- Entry: ~15° from top (300,106), Exit: ~95° from top (423,283) -->
      <!-- Jaw circle: center (547,66) radius 250 → ~38% bite depth -->
      <path d="M 300 106 A 250 250 0 0 0 423 283 L 512 512 L 512 0 Z" fill="black"/>
      <!-- 4 rounded teeth bumps along jaw arc -->
      <circle cx="311" cy="148" r="18" fill="white"/>
      <circle cx="329" cy="189" r="18" fill="white"/>
      <circle cx="355" cy="226" r="18" fill="white"/>
      <circle cx="386" cy="257" r="18" fill="white"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="100"/>

  <!-- Plate -->
  <g mask="url(#bite)">
    <!-- Outer shadow ring -->
    <circle cx="256" cy="268" r="180" fill="rgba(180,205,238,0.55)"/>
    <!-- Rim surface -->
    <circle cx="256" cy="268" r="168" fill="rgba(255,255,255,0.93)"/>
    <!-- Rim-to-surface groove -->
    <circle cx="256" cy="268" r="152" fill="rgba(200,222,248,0.72)"/>
    <!-- Eating surface -->
    <circle cx="256" cy="268" r="143" fill="rgba(255,255,255,0.97)"/>
  </g>
</svg>
