<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="25%" r="80%">
      <stop offset="0%"   stop-color="#82B8FF"/>
      <stop offset="100%" stop-color="#4A84E8"/>
    </radialGradient>
    <mask id="bite">
      <rect width="512" height="512" fill="white"/>
      <path d="M 512 0 L 512 330 L 455 265 A 38 38 0 0 0 401 225 A 38 38 0 0 1 347 185 A 38 38 0 0 0 293 145 A 38 38 0 0 1 239 105 A 38 38 0 0 0 185 65 L 295 0 Z" fill="black"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="100"/>

  <!-- Plate -->
  <g mask="url(#bite)">
    <!-- Outer shadow ring: gives the plate a sense of depth and edge -->
    <circle cx="256" cy="268" r="180" fill="rgba(180,205,238,0.55)"/>
    <!-- Rim surface: the raised rim of the plate, bright white -->
    <circle cx="256" cy="268" r="168" fill="rgba(255,255,255,0.93)"/>
    <!-- Rim-to-surface groove: subtle shadow at the base of the rim -->
    <circle cx="256" cy="268" r="152" fill="rgba(200,222,248,0.72)"/>
    <!-- Eating surface: flat inner area, brightest white -->
    <circle cx="256" cy="268" r="143" fill="rgba(255,255,255,0.97)"/>
  </g>
</svg>