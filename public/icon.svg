<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="25%" r="80%">
      <stop offset="0%"   stop-color="#82B8FF"/>
      <stop offset="100%" stop-color="#4A84E8"/>
    </radialGradient>

    <!-- Mask: white = visible, black circle = the bite -->
    <mask id="bite">
      <rect width="512" height="512" fill="white"/>
      <circle cx="378" cy="142" r="82" fill="black"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="100"/>

  <!-- Plate (everything masked by the bite) -->
  <g mask="url(#bite)">
    <!-- Rim base -->
    <circle cx="256" cy="275" r="178" fill="rgba(255,255,255,0.80)"/>
    <!-- Rim inner shadow ring to show depth of the raised edge -->
    <circle cx="256" cy="275" r="168"
      fill="none" stroke="rgba(160,190,230,0.50)" stroke-width="20"/>
    <!-- Flat eating surface -->
    <circle cx="256" cy="275" r="158" fill="rgba(255,255,255,0.95)"/>
  </g>
</svg>